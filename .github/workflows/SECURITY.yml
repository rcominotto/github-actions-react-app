name: Security Scan
# Naam van de workflow zoals zichtbaar in GitHub Actions

on:
  workflow_dispatch:
  # Laat je de workflow handmatig starten via GitHub UI

  schedule:
    - cron: "0 0 * * *"
    # Draait elke dag om 00:00 UTC automatisch

jobs:
  dependency-scan:
  # Eén job die alle security checks uitvoert
    runs-on: ubuntu-latest
    # GitHub runner (Linux VM)
    container:
      image: node:20
    # Docker container met Node 20 voor consistente omgeving
    steps:
    # Alle stappen worden sequentieel uitgevoerd
      - uses: actions/checkout@v4
        # Haalt repository code op naar de runner

      - run: npm ci
        # Installeert dependencies exact zoals in package-lock.json

      - run: npm audit
        # Controleert dependencies op bekende security issues

      - run: npm audit --audit-level=high
        # Laat job falen bij HIGH of CRITICAL vulnerabilities
  codeql-scan:
    needs: dependency-scan
    runs-on: ubuntu-latest
    # GitHub runner (Linux VM)
    container:
      image: node:20
    permissions:
      contents: read
      # Nodig om code te kunnen lezen
      security-events: write
      # Nodig om CodeQL resultaten naar GitHub Security tab te sturen
    steps:
      - uses: github/codeql-action/init@v3
        # Initialiseert CodeQL analyse engine
        # Bouwt een database van je code voor deep security analysis
        with:
          languages: javascript
          # Geeft aan dat dit een JavaScript/React/Vite project is
      - uses: github/codeql-action/analyze@v3
        # Voert de daadwerkelijke CodeQL analyse uit
        # Zoekt naar complexe security vulnerabilities (data flow, injection, etc.)